<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Открытка</title>
    <style>
        /* ===== ОБЩИЕ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffe6ec;
            /* запасной цвет */;
            animation: gradientBG 12s ease infinite alternate;
            background-size: 400% 400%;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% {
                background: #ffe6ec;
            }
            25% {
                background: #ffd9e5;
            }
            50% {
                background: #ffccdd;
            }
            75% {
                background: #ffd9e5;
            }
            100% {
                background: #ffe6ec;
            }
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        /* ===== ЭКРАН ВВОДА КОДА ===== */
        .password-screen {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            padding: 40px 30px;
            border-radius: 32px;
            border: 2px solid rgba(255, 192, 203, 0.5);
            box-shadow: 0 20px 60px rgba(255, 192, 203, 0.2);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .password-screen h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #e75480;
        }

        .password-screen p {
            font-size: 18px;
            color: #888;
            margin-bottom: 30px;
        }

        .password-screen input {
            width: 80%;
            padding: 14px 20px;
            font-size: 18px;
            border: 2px solid #ffb6c1;
            border-radius: 40px;
            background: #fff;
            color: #333;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }

        .password-screen input:focus {
            border-color: #e75480;
            box-shadow: 0 0 0 4px rgba(255, 182, 193, 0.4);
        }

        .password-screen button {
            margin-top: 20px;
            padding: 14px 40px;
            font-size: 18px;
            border: none;
            border-radius: 40px;
            background: #ffb6c1;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .password-screen button:hover {
            background: #e75480;
            transform: scale(1.05);
        }

        .error-message {
            color: #e74c3c;
            margin-top: 15px;
            font-size: 16px;
            min-height: 24px;
        }

        /* ===== ОТКРЫТКА (скрыта изначально) ===== */
        .card {
            display: none;
            position: relative;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(6px);
            padding: 40px 30px;
            border-radius: 32px;
            border: 2px solid rgba(255, 182, 193, 0.6);
            box-shadow: 0 30px 80px rgba(255, 182, 193, 0.3);
            animation: cardIn 0.8s ease forwards;
            overflow: hidden;
        }

        @keyframes cardIn {
            0% {
                opacity: 0;
                transform: scale(0.9) translateY(30px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* Стикеры на фоне открытки */
        .sticker {
            position: absolute;
            font-size: 40px;
            opacity: 0.3;
            user-select: none;
            pointer-events: none;
            animation: floatSticker 8s infinite alternate ease-in-out;
        }

        .sticker:nth-child(1) {
            top: 5%;
            left: 5%;
            font-size: 50px;
            animation-duration: 10s;
        }
        .sticker:nth-child(2) {
            top: 15%;
            right: 5%;
            font-size: 40px;
            animation-duration: 12s;
            animation-delay: 1s;
        }
        .sticker:nth-child(3) {
            bottom: 20%;
            left: 8%;
            font-size: 55px;
            animation-duration: 9s;
            animation-delay: 2s;
        }
        .sticker:nth-child(4) {
            bottom: 10%;
            right: 8%;
            font-size: 45px;
            animation-duration: 11s;
            animation-delay: 0.5s;
        }
        .sticker:nth-child(5) {
            top: 45%;
            left: 2%;
            font-size: 35px;
            animation-duration: 13s;
            animation-delay: 3s;
        }
        .sticker:nth-child(6) {
            top: 40%;
            right: 2%;
            font-size: 35px;
            animation-duration: 10s;
            animation-delay: 1.5s;
        }

        @keyframes floatSticker {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }
            100% {
                transform: translate(20px, -30px) rotate(15deg);
            }
        }

        .card h2 {
            font-size: 40px;
            color: #e75480;
            margin-bottom: 15px;
            position: relative;
            z-index: 2;
        }

        .card .emoji-big {
            font-size: 90px;
            display: block;
            margin: 20px 0;
            position: relative;
            z-index: 2;
        }

        .back-link {
            display: none;
            margin-top: 30px;
            color: #aaa;
            font-size: 14px;
            cursor: pointer;
            text-decoration: underline;
            position: relative;
            z-index: 2;
        }
        .back-link:hover {
            color: #e75480;
        }

        /* ===== КОНФЕТТИ ===== */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confettiFall 3s linear forwards;
        }

        @keyframes confettiFall {
            0% {
                opacity: 1;
                transform: translateY(-10px) rotate(0deg) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(110vh) rotate(720deg) scale(0.5);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ЭКРАН ВВОДА КОДА -->
        <div id="passwordScreen" class="password-screen">
            <h1>🔐 Введи секретный код</h1>
            <p>Чтобы увидеть послание</p>
            <input type="text" id="codeInput" placeholder="Введи код..." />
            <br />
            <button onclick="checkCode()">Открыть</button>
            <div class="error-message" id="errorMsg"></div>
        </div>

        <!-- ОТКРЫТКА -->
        <div id="cardContainer" class="card">
            <!-- Стикеры (фоновые) -->
            <div class="sticker">🌸</div>
            <div class="sticker">💖</div>
            <div class="sticker">🌷</div>
            <div class="sticker">✨</div>
            <div class="sticker">🕊️</div>
            <div class="sticker">🌺</div>

            <h2>С днём рождения!</h2>
            <span class="emoji-big">🎉💐🎂</span>
            <div class="back-link" onclick="resetCard()">🔙 Вернуться к коду</div>
        </div>
    </div>

    <div id="confettiContainer" class="confetti-container"></div>

    <script>
        const SECRET_CODE = "12.07.2026";

        function checkCode() {
            const input = document.getElementById('codeInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');

            if (input === SECRET_CODE) {
                document.getElementById('passwordScreen').style.display = 'none';
                document.getElementById('cardContainer').style.display = 'block';
                errorMsg.textContent = '';
                launchConfetti();
            } else {
                errorMsg.textContent = '❌ Неверный код. Попробуй ещё раз.';
                document.getElementById('codeInput').value = '';
                document.getElementById('codeInput').focus();
            }
        }

        function resetCard() {
            document.getElementById('passwordScreen').style.display = 'block';
            document.getElementById('cardContainer').style.display = 'none';
            document.getElementById('codeInput').value = '';
            document.getElementById('errorMsg').textContent = '';
        }

        // Enter
        document.getElementById('codeInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkCode();
            }
        });

        // ===== КОНФЕТТИ =====
        function launchConfetti() {
            const container = document.getElementById('confettiContainer');
            const colors = ['#ffb6c1', '#ff69b4', '#ff1493', '#ffa07a', '#ffd700', '#87ceeb', '#98fb98', '#dda0dd'];

            for (let i = 0; i < 120; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                const size = Math.random() * 8 + 6;
                confetti.style.width = size + 'px';
                confetti.style.height = size + 'px';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                confetti.style.animationDelay = (Math.random() * 1.5) + 's';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                container.appendChild(confetti);
            }

            // Удалить конфетти через 5 секунд, чтобы не накапливались
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }
    </script>
</body>
</html>
